packages:
  - "apps/*"
  - "packages/*"
  - "contracts"
allowBuilds:
  '@clerk/shared': true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  bufferutil: true
  keccak: true
  prisma: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@3.0.129'
  - '@ai-sdk/openai@3.0.71'
  - '@ai-sdk/provider-utils@4.0.29'
  - ai@6.0.203
  - '@ai-sdk/react@3.0.205'
